<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026社團聯合招生結果查詢</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body { font-family: -apple-system, "Microsoft JhengHei", sans-serif; }
  .fade-in { animation: fadeIn .4s ease; }
  @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
</style>
</head>
<body class="bg-gradient-to-b from-indigo-50 to-slate-100 min-h-screen">
<div class="max-w-xl mx-auto px-4 py-8">

  <div class="bg-indigo-600 rounded-2xl shadow-lg p-6 text-center text-white mb-6">
    <h1 class="text-xl sm:text-2xl font-bold">2026 社團聯合招生結果查詢</h1>
    <p class="text-indigo-100 text-sm mt-2">查詢結果並確認加入社團</p>
  </div>

  <div id="formCard" class="bg-white rounded-2xl shadow p-6 space-y-4">
    <div>
      <label class="block text-sm font-medium text-slate-700 mb-1">姓名</label>
      <input id="name" type="text" placeholder="請輸入姓名"
             class="w-full border border-slate-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-indigo-500 focus:outline-none">
    </div>
    <div>
      <label class="block text-sm font-medium text-slate-700 mb-1">班別</label>
      <input id="cls" type="text" placeholder="例如：1B"
             class="w-full border border-slate-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-indigo-500 focus:outline-none">
    </div>
    <div>
      <label class="block text-sm font-medium text-slate-700 mb-1">電話（8 位）</label>
      <input id="phone" type="tel" maxlength="8" inputmode="numeric" placeholder="8 位數字"
             class="w-full border border-slate-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-indigo-500 focus:outline-none">
    </div>
    <button id="btn" onclick="doQuery()"
            class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-2.5 rounded-lg transition disabled:opacity-50">
      查詢結果
    </button>
  </div>

  <div id="result" class="mt-6"></div>
</div>

<script>
// ====== 改成你自己的部署網址（結尾 /exec）======
const API_URL = "https://script.google.com/macros/s/AKfycbw8gY3DYUnHAEdwv78FQoIIK5hhq17JKCL9KHduSh1SZEBeBla49QK92BzHG2C7LptrTg/exec";

const $ = id => document.getElementById(id);
const resultBox = $('result');
let currentData = null;
let whoami = {};

function showMsg(html, color){
  resultBox.innerHTML = `<div class="fade-in bg-white border-l-4 ${color} rounded-xl shadow p-5">${html}</div>`;
}

async function doQuery(){
  const name  = $('name').value.trim();
  const cls   = $('cls').value.trim();
  const phone = $('phone').value.trim();

  if(!name || !cls || !phone){ showMsg('⚠️ 請完整填寫姓名、班別與電話。','border-amber-500'); return; }
  if(!/^\d{8}$/.test(phone)){ showMsg('⚠️ 電話必須是 8 位數字。','border-amber-500'); return; }

  whoami = {name, cls, phone};
  const btn = $('btn'); btn.disabled=true; btn.textContent='查詢中…';
  showMsg('🔄 正在查詢，請稍候…','border-indigo-400');

  const url = `${API_URL}?phone=${encodeURIComponent(phone)}&name=${encodeURIComponent(name)}&cls=${encodeURIComponent(cls)}`;
  try{
    const res = await fetch(url);
    const json = await res.json();
    if(json.success){ currentData = json.data; renderResult(json.data); }
    else{ showMsg(`😕 ${json.message||'查無資料'}`,'border-red-500'); }
  }catch(err){
    showMsg(`❌ 連線失敗：<br><span class="text-xs text-slate-400">${err.message}</span>`,'border-red-500');
  }finally{
    btn.disabled=false; btn.textContent='查詢結果';
  }
}

function renderResult(d){
  const maxSel = parseInt(d.maxSelectable) || 0;
  const isConfirmed = d.confirmed && d.confirmed.length > 0;

  let html = `
    <div class="fade-in bg-white rounded-2xl shadow p-6">
      <h2 class="text-lg font-bold text-indigo-700 mb-1">${d.name}　<span class="text-sm font-normal text-slate-500">${d.cls}</span></h2>
      <p class="text-sm text-slate-500 mb-4">招生結果如下：</p>
      <div class="space-y-3">`;

  (d.results || []).forEach(it=>{
    const accept = it.state === '入選';
    const badge = accept
      ? '<span class="text-xs bg-green-100 text-green-700 px-2 py-0.5 rounded-full">入選</span>'
      : (it.state === '候補'
          ? '<span class="text-xs bg-amber-100 text-amber-700 px-2 py-0.5 rounded-full">候補</span>'
          : `<span class="text-xs bg-slate-100 text-slate-500 px-2 py-0.5 rounded-full">${it.state||'—'}</span>`);
    const chk = (accept && !isConfirmed)
      ? `<input type="checkbox" class="club-chk w-5 h-5 accent-indigo-600" value="${it.club}" onchange="limitCheck(${maxSel})">`
      : '';
    html += `
      <div class="flex items-center justify-between border border-slate-200 rounded-lg p-3">
        <div>
          <span class="font-medium text-slate-800">${it.club}</span> ${badge}
          ${it.role ? `<span class="text-xs text-slate-400 ml-1">${it.role}</span>` : ''}
        </div>
        ${chk}
      </div>`;
  });
  html += `</div>`;

  if(isConfirmed){
    const names = d.confirmed.map(c=>c.role?`${c.club}（${c.role}）`:c.club).join('、');
    html += `
      <div class="mt-5 bg-green-50 border border-green-200 rounded-lg p-4 text-center">
        <p class="text-green-700 font-semibold">✅ 您已確認加入：${names}</p>
        ${d.confirmTime?`<p class="text-xs text-green-500 mt-1">確認時間：${d.confirmTime}</p>`:''}
      </div>`;
  } else if(maxSel > 0){
    html += `
      <p class="text-sm text-slate-500 mt-4">請勾選要加入的社團（最多 ${maxSel} 個），<span class="text-red-500">確認後無法更改</span>：</p>
      <button onclick="doConfirm()" id="confirmBtn"
              class="w-full mt-3 bg-green-600 hover:bg-green-700 text-white font-semibold py-2.5 rounded-lg transition disabled:opacity-50">
        確認加入
      </button>`;
  } else {
    html += `<div class="mt-5 bg-slate-50 border border-slate-200 rounded-lg p-4 text-center text-slate-500 text-sm">本次沒有需要確認的入選社團。</div>`;
  }

  html += `</div>`;
  resultBox.innerHTML = html;
}

function limitCheck(max){
  const checked = document.querySelectorAll('.club-chk:checked');
  if(checked.length > max){
    checked[checked.length-1].checked = false;
    alert(`最多只能選擇 ${max} 個社團`);
  }
}

async function doConfirm(){
  const chosen = [...document.querySelectorAll('.club-chk:checked')].map(c=>c.value);
  if(chosen.length === 0){ alert('請至少勾選一個社團'); return; }
  if(!confirm(`確定加入：${chosen.join('、')}？\n確認後將無法更改。`)) return;

  const btn = $('confirmBtn'); btn.disabled=true; btn.textContent='送出中…';
  try{
    const res = await fetch(API_URL, {
      method:'POST',
      headers:{ 'Content-Type':'text/plain;charset=utf-8' },
      body: JSON.stringify({
        action:'confirm',
        phone: whoami.phone,
        name:  whoami.name,
        cls:   whoami.cls,
        choices: chosen
      })
    });
    const json = await res.json();
    if(json.success){
      showMsg(`✅ 確認成功！您已加入：${chosen.join('、')}`,'border-green-500');
    }else{
      alert('確認失敗：' + (json.message||'未知錯誤'));
      btn.disabled=false; btn.textContent='確認加入';
    }
  }catch(err){
    alert('連線失敗：' + err.message);
    btn.disabled=false; btn.textContent='確認加入';
  }
}
</script>
</body>
</html>
