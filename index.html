<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026社團聯合招生結果查詢系統</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body { font-family: -apple-system, "Microsoft JhengHei", "PingFang TC", sans-serif; }
  .fade-in { animation: fadeIn .4s ease; }
  @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
</style>
</head>
<body class="bg-gradient-to-b from-indigo-50 to-slate-100 min-h-screen">
<div class="max-w-xl mx-auto px-4 py-8">

  <!-- 標題 -->
  <div class="bg-indigo-600 rounded-2xl shadow-lg p-6 text-center text-white mb-6">
    <h1 class="text-xl sm:text-2xl font-bold">2026 社團聯合招生結果查詢</h1>
    <p class="text-indigo-100 text-sm mt-2">請輸入資料查詢您的錄取結果</p>
  </div>

  <!-- 查詢表單 -->
  <div class="bg-white rounded-2xl shadow p-6 space-y-4">
    <div>
      <label class="block text-sm font-medium text-slate-700 mb-1">姓名</label>
      <input id="name" type="text" placeholder="請輸入姓名"
             class="w-full border border-slate-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-indigo-500 focus:outline-none">
    </div>
    <div>
      <label class="block text-sm font-medium text-slate-700 mb-1">班別</label>
      <input id="cls" type="text" placeholder="例如：1A"
             class="w-full border border-slate-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-indigo-500 focus:outline-none">
    </div>
    <div>
      <label class="block text-sm font-medium text-slate-700 mb-1">電話（8 位）</label>
      <input id="phone" type="tel" maxlength="8" inputmode="numeric" placeholder="8 位數字"
             class="w-full border border-slate-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-indigo-500 focus:outline-none">
    </div>
    <button id="btn" onclick="doQuery()"
            class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-2.5 rounded-lg transition disabled:opacity-50">
      查詢結果
    </button>
  </div>

  <!-- 結果顯示區 -->
  <div id="result" class="mt-6"></div>

</div>

<script>
// ====== 請改成你自己的 Apps Script 部署網址（結尾 /exec）======
const API_URL = "https://script.google.com/macros/s/AKfycbyrjQnCy5l7a3CIWLH9TYDkF-YvUWFXhui25V4n0O6u1l7B1grbCTMQwVWixindXVXnag/exec";

const $ = id => document.getElementById(id);
const resultBox = $('result');

function showMsg(html, color){
  resultBox.innerHTML =
    `<div class="fade-in bg-white border-l-4 ${color} rounded-xl shadow p-5">${html}</div>`;
}

async function doQuery(){
  const name  = $('name').value.trim();
  const cls   = $('cls').value.trim();
  const phone = $('phone').value.trim();

  // 基本驗證
  if(!name || !cls || !phone){
    showMsg('⚠️ 請完整填寫姓名、班別與電話。', 'border-amber-500');
    return;
  }
  if(!/^\d{8}$/.test(phone)){
    showMsg('⚠️ 電話必須是 8 位數字。', 'border-amber-500');
    return;
  }

  const btn = $('btn');
  btn.disabled = true;
  btn.textContent = '查詢中…';
  showMsg('🔄 正在查詢，請稍候…', 'border-indigo-400');

  const url = `${API_URL}?phone=${encodeURIComponent(phone)}&name=${encodeURIComponent(name)}&cls=${encodeURIComponent(cls)}`;

  try{
    const res = await fetch(url);
    const json = await res.json();

    if(json.success){
      renderResult(json.data);
    }else{
      showMsg(`😕 查無資料<br><span class="text-sm text-slate-500">${json.message || '請確認輸入的姓名、班別、電話是否正確。'}</span>`, 'border-red-500');
    }
  }catch(err){
    showMsg(`❌ 連線失敗，請稍後再試。<br><span class="text-xs text-slate-400">${err.message}</span>`, 'border-red-500');
  }finally{
    btn.disabled = false;
    btn.textContent = '查詢結果';
  }
}

// 將後端回傳的資料漂亮地顯示出來（自動列出所有欄位）
function renderResult(data){
  let rows = '';
  for(const key in data){
    rows += `
      <div class="flex justify-between py-2 border-b border-slate-100 last:border-0">
        <span class="text-slate-500 text-sm">${key}</span>
        <span class="text-slate-800 font-medium text-right">${data[key]}</span>
      </div>`;
  }
  showMsg(`
    <h2 class="text-lg font-bold text-indigo-700 mb-3">🎉 查詢結果</h2>
    ${rows}
  `, 'border-green-500');
}

// 按 Enter 也能查詢
document.addEventListener('keydown', e => { if(e.key === 'Enter') doQuery(); });
</script>
</body>
</html>
